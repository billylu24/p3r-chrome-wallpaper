<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Live2D Character</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=4.0"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.22), transparent 30%),
        linear-gradient(120deg, rgba(46, 158, 255, 0.28), transparent 42%),
        linear-gradient(240deg, rgba(20, 72, 188, 0.34), transparent 48%);
      mix-blend-mode: screen;
      z-index: 1;
    }

    body::after {
      background:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.28;
      z-index: 2;
    }

    #glcanvas {
      width: 100%;
      height: 100%;
      display: block;

      max-width: 100%;
      max-height: 100%;

      background-image: url("assets/image/costumeBG.png");
      background-size: 145%;
      background-position: 50% 48%;
      background-repeat: no-repeat;
      filter: saturate(1.05) contrast(1.04);
      position: relative;
      z-index: 0;
    }

    #btnChange {
      display: none;
    }

  </style>
</head>

<body>
  <button id="btnChange" class="active" type="button">Change Model</button>

  <canvas id="glcanvas" width="680" height="940"></canvas>

  <!-- Live2D Library -->
  <script src="src/lib/live2d.min.js"></script>

  <!-- Live2D Framework -->
  <script src="src/framework/Live2DFramework.js"></script>

  <!-- User Scripts -->
  <script src="src/utils/MatrixStack.js"></script>
  <script src="src/utils/ModelSettingJson.js"></script>
  <script src="src/PlatformManager.js"></script>
  <script src="src/LAppDefine.js"></script>
  <script src="src/LAppModel.js"></script>
  <script src="src/LAppLive2DManager.js"></script>
  <script src="src/main.js"></script>



  <!-- CSP-safe startup -->
  <script src="boot.js"></script>
</body>
</html>
