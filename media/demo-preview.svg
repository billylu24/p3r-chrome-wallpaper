<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">P3R Chrome Wallpaper demo preview</title>
  <desc id="desc">Blue and black preview card with a play button for the demo video.</desc>
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.8" fill="#061326" opacity="0.16"/>
    </pattern>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#37cfff"/>
      <stop offset="0.48" stop-color="#1689f2"/>
      <stop offset="1" stop-color="#0739b8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#f5fbff"/>
  <rect width="1280" height="720" fill="url(#dots)"/>
  <polygon points="0,0 1280,0 1280,720 340,720" fill="url(#blue)"/>
  <polygon points="0,0 315,0 0,720" fill="#05070c"/>
  <polygon points="870,0 1280,0 1280,170 1010,170" fill="#061326" opacity="0.9"/>
  <polygon points="985,720 1280,380 1280,720" fill="#061326" opacity="0.92"/>
  <polygon points="90,510 410,140 480,190 160,560" fill="#061326" opacity="0.72"/>
  <g transform="translate(95 96) rotate(-16)">
    <text x="0" y="0" fill="#061326" font-family="Arial Black, Impact, sans-serif" font-size="86" font-style="italic">P3R</text>
    <text x="6" y="76" fill="#f5fbff" font-family="Arial Black, Impact, sans-serif" font-size="54" font-style="italic">NEW TAB</text>
    <text x="8" y="124" fill="#00c8ef" font-family="Arial Black, Impact, sans-serif" font-size="34" font-style="italic">COMMAND VAULT</text>
  </g>
  <g transform="translate(392 190)">
    <rect x="0" y="0" width="620" height="340" fill="#f7fbff" opacity="0.92" stroke="#061326" stroke-width="8"/>
    <polygon points="0,0 620,0 550,70 0,70" fill="#061326"/>
    <text x="34" y="48" fill="#f7fbff" font-family="Arial Black, Impact, sans-serif" font-size="34" font-style="italic">WATCH DEMO</text>
    <text x="35" y="288" fill="#061326" font-family="Arial, sans-serif" font-size="28" font-weight="700">Click to open the MP4 demo video</text>
  </g>
  <g transform="translate(640 360)">
    <circle cx="0" cy="0" r="88" fill="#061326"/>
    <circle cx="0" cy="0" r="76" fill="#00c8ef"/>
    <polygon points="-22,-42 -22,42 50,0" fill="#f7fbff"/>
  </g>
</svg>
