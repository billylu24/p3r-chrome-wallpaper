<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P3R New Tab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video autoplay loop muted playsinline id="bg-video">
    <source src="loop.mp4" type="video/mp4" />
  </video>

  <div class="video-overlay"></div>

  <main class="dashboard-grid">
    <!-- Left top -->
    <section class="panel tile-panel app-panel left-top">
      <div class="spotify-mark" aria-label="Spotify">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </section>

    <!-- Left bottom -->
    <section class="panel tile-panel character-panel left-bottom">
      <img
        class="character-img"
        src="icon.jpg"
        alt="Character"
      />
    </section>

    <!-- Hero -->
    <section class="hero-block center-top">
      <img
        src="logo.svg"
        alt="P3R Logo"
        class="logo hero-logo glitch-logo"
      />

      <section class="panel info-panel">
        <p class="info-title">Hi Giaok...</p>
        <p class="info-subtitle">Rn ur 18.0000 yr old</p>
      </section>
    </section>

    <!-- Search -->
    <form
      action="https://www.google.com/search"
      method="get"
      class="search-form dashboard-search center-search"
      target="_self"
      autocomplete="off"
    >
      <input
        type="text"
        id="search-input"
        name="q"
        placeholder="Search..."
        required
      />

      <div class="engine-group">
        <button type="button" class="engine-btn" id="btn-bili">Bili</button>
        <button type="button" class="engine-btn" id="btn-github">Git</button>
        <button type="button" class="engine-btn" id="btn-yt">YT</button>
      </div>

      <button type="submit" class="search-submit" aria-label="Search">⌕</button>

      <ul id="suggestions-list" class="suggestions"></ul>
    </form>

    <!-- Clock + tabs -->
    <section class="center-lower">
      <section class="panel clock-panel">
        <div class="clock-face">
          <div class="digital-clock" id="clock-text">15:18</div>
        </div>
      </section>

      <div class="shortcuts-container" id="shortcuts-container">
        <!-- JS injects shortcuts -->
      </div>
    </section>

    <!-- Calendar -->
    <section class="panel calendar-panel calendar-block">
      <div class="calendar-title" id="calendar-title">2026/03/25 Wed</div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <!-- Right memo -->
    <aside class="panel memo-panel right-memo"></aside>
  </main>

  <!-- Add shortcut modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal-content">
      <h3>Add Shortcut</h3>

      <input
        type="text"
        id="shortcut-name"
        class="modal-input"
        placeholder="Name"
      />

      <input
        type="text"
        id="shortcut-url"
        class="modal-input"
        placeholder="URL"
      />

      <div class="modal-buttons">
        <button class="btn-cancel" id="modal-cancel" type="button">Cancel</button>
        <button class="btn-save" id="modal-save" type="button">Done</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
