<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>P3R New Tab</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <video autoplay loop muted playsinline id="bg-video">
    <source src="loop.mp4" type="video/mp4" />
  </video>

  <div class="video-overlay"></div>

  <main class="dashboard-grid">
    <!-- Left top: clock -->
    <section class="panel clock-panel left-top mini-clock-panel">
      <div class="clock-face mini-clock-face">
        <div class="digital-clock mini-digital-clock" id="clock-text">15:18</div>
      </div>
    </section>

    <!-- Bayern match ticker -->
    <section class="panel bayern-ticker left-tabs" aria-live="polite">
      <div class="bayern-scoreline">
        <div class="bayern-ticker-team">
          <img class="bayern-logo" id="bayern-home-logo" alt="" />
          <span class="bayern-team-name" id="bayern-home-name">Home</span>
        </div>

        <div class="bayern-ticker-score">
          <span id="bayern-home-score">-</span>
          <span class="bayern-score-divider">:</span>
          <span id="bayern-away-score">-</span>
        </div>

        <div class="bayern-ticker-team">
          <img class="bayern-logo" id="bayern-away-logo" alt="" />
          <span class="bayern-team-name" id="bayern-away-name">Away</span>
        </div>
      </div>

      <div class="bayern-ticker-meta">
        <span id="bayern-status">vs</span>
        <span id="bayern-competition">FC Bayern Munich</span>
      </div>
      <div class="bayern-detail" id="bayern-detail">Fetching latest Bayern match...</div>
    </section>

    <!-- Left bottom: Live2D character -->
    <section class="panel tile-panel character-panel left-bottom">
      <iframe
        id="character-frame"
        class="character-frame"
        src="character/index.html"
        title="Live2D Character"
        loading="eager"
        referrerpolicy="no-referrer"
      ></iframe>
    </section>

    <!-- Hero -->
    <section class="hero-block center-top">
      <section class="panel logo-panel">
        <img
          src="logo.svg"
          alt="P3R Logo"
          class="logo hero-logo glitch-logo"
        />
      </section>

      <section class="panel info-panel">
        <p class="info-title" id="greeting-title">Hi Giaok...</p>
        <p class="info-subtitle" id="greeting-age">Right now you are 18.000000 years old!</p>
      </section>
    </section>

    <!-- Search -->
    <form
      action="https://www.google.com/search"
      method="get"
      class="search-form dashboard-search center-search"
      target="_self"
      autocomplete="off"
    >
      <input
        type="text"
        id="search-input"
        name="q"
        placeholder="Search..."
        required
      />

      <div class="engine-group">
        <button type="button" class="engine-btn" id="btn-bili">Bili</button>
        <button type="button" class="engine-btn" id="btn-github">Git</button>
        <button type="button" class="engine-btn" id="btn-yt">YT</button>
      </div>

      <button type="submit" class="search-submit" aria-label="Search">⌕</button>

      <ul id="suggestions-list" class="suggestions"></ul>
    </form>

    <!-- Lower center: Spotify iframe host -->
    <section class="center-lower">
      <section class="panel spotify-host-panel" aria-label="Player">
        <iframe
          id="spotify-panel-frame"
          src="https://billylu24.github.io/spotifypageGIAOK/?compact=1"
          title="Spotify Panel"
          allow="autoplay; encrypted-media"
          loading="eager"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>

      <div class="shortcuts-container" id="shortcuts-container">
        <!-- JS injects shortcuts -->
      </div>
    </section>

    <!-- Daily command + calendar -->
    <section class="calendar-stack calendar-block">
      <section class="panel daily-panel">
        <div class="daily-header">
          <div>
            <div class="daily-title">Command Vault</div>
            <div class="daily-subtitle">Copy-ready dev commands</div>
          </div>
        </div>

        <div class="command-vault" id="command-vault">
          <div class="command-tabs" id="command-tabs" aria-label="Command categories"></div>
          <div class="command-list" id="command-list"></div>
        </div>
      </section>

      <section class="panel calendar-panel">
        <div class="calendar-header">
          <button class="calendar-nav" id="calendar-prev" type="button" aria-label="Previous month">
            ‹
          </button>

          <div class="calendar-title-wrap">
            <div class="calendar-title" id="calendar-title">March 2026</div>
            <div class="calendar-subtitle" id="calendar-subtitle">Wednesday, March 25</div>
          </div>

          <button class="calendar-nav" id="calendar-next" type="button" aria-label="Next month">
            ›
          </button>
        </div>

        <div class="calendar-grid" id="calendar-grid"></div>
      </section>
    </section>

    <!-- Right tools -->
    <aside class="panel memo-panel right-memo">
      <div class="tool-bubble-stage" id="tool-bubble-stage">
        <svg class="tool-bubble-svg" id="tool-bubble-svg" aria-hidden="true"></svg>
        <div class="tool-bubble-links" id="tool-bubble-links"></div>
      </div>
    </aside>
  </main>

  <!-- Add shortcut modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal-content">
      <h3>Add Shortcut</h3>

      <input
        type="text"
        id="shortcut-name"
        class="modal-input"
        placeholder="Name"
      />

      <input
        type="text"
        id="shortcut-url"
        class="modal-input"
        placeholder="URL"
      />

      <div class="modal-buttons">
        <button class="btn-cancel" id="modal-cancel" type="button">Cancel</button>
        <button class="btn-save" id="modal-save" type="button">Done</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
